<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" fill="none">
  <defs>
    <linearGradient id="bg192" x1="0" y1="0" x2="192" y2="192" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="40" fill="url(#bg192)"/>
  <!-- Ring arc (300°) + chevron, white on gradient bg -->
  <!-- Centre (96,109), radius 49. Arc endpoints at 300° and 240°:
       300°: (96+49×0.5, 109−49×0.866) = (120.5, 66.6)
       240°: (96−24.5, 66.6) = (71.5, 66.6)
       Peak: (96, 25) -->
  <path d="M 120.5,66.6 A 49,49 0 1 1 71.5,66.6 L 96,25 Z"
        fill="none" stroke="white" stroke-width="14"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Centre dot -->
  <circle cx="96" cy="109" r="8.5" fill="white"/>
</svg>
