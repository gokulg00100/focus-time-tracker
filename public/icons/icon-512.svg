<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg512" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="110" fill="url(#bg512)"/>
  <!-- Ring arc (300°) + chevron, white on gradient bg -->
  <!-- Centre (256,290), radius 130. Arc endpoints at 300° and 240°:
       300°: (256+130×0.5, 290−130×0.866) = (321, 177.4)
       240°: (256−65, 177.4) = (191, 177.4)
       Peak: (256, 62) -->
  <path d="M 321,177.4 A 130,130 0 1 1 191,177.4 L 256,62 Z"
        fill="none" stroke="white" stroke-width="38"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Centre dot -->
  <circle cx="256" cy="290" r="22" fill="white"/>
</svg>
