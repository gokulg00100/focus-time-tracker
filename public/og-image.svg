<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="mark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="ring1" x1="0" y1="0" x2="0" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="ring2" x1="0" y1="0" x2="0" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#818CF8" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative rings (right side) -->
  <circle cx="980" cy="315" r="280" fill="none" stroke="url(#ring1)" stroke-width="1.5"/>
  <circle cx="980" cy="315" r="200" fill="none" stroke="url(#ring2)" stroke-width="1"/>
  <circle cx="980" cy="315" r="120" fill="none" stroke="url(#ring1)" stroke-width="0.8"/>

  <!-- Logo mark (scaled to 140×140, centred at 148,200) -->
  <svg x="88" y="150" width="140" height="140" viewBox="0 0 100 100" fill="none">
    <path d="M66,29.3 A32,32 0 1 1 34,29.3 L50,7 Z"
          stroke="url(#mark)" stroke-width="10"
          stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="50" cy="57" r="5.5" fill="url(#mark)"/>
  </svg>

  <!-- App name -->
  <text x="88" y="358"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="72" font-weight="700" letter-spacing="-2"
        fill="white">Focus Timer</text>

  <!-- Tagline -->
  <text x="90" y="420"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="28" font-weight="400" letter-spacing="-0.3"
        fill="#818CF8">Build deep work habits. Track every session.</text>

  <!-- Divider -->
  <rect x="88" y="466" width="56" height="3" rx="2" fill="#6366F1"/>

  <!-- Feature pills -->
  <rect x="88"  y="496" width="148" height="40" rx="20" fill="#6366F1" fill-opacity="0.18"/>
  <text x="162" y="522" text-anchor="middle"
        font-family="Inter, -apple-system, sans-serif"
        font-size="18" font-weight="500" fill="#818CF8">Focus Sessions</text>

  <rect x="252" y="496" width="136" height="40" rx="20" fill="#6366F1" fill-opacity="0.18"/>
  <text x="320" y="522" text-anchor="middle"
        font-family="Inter, -apple-system, sans-serif"
        font-size="18" font-weight="500" fill="#818CF8">Analytics</text>

  <rect x="404" y="496" width="120" height="40" rx="20" fill="#6366F1" fill-opacity="0.18"/>
  <text x="464" y="522" text-anchor="middle"
        font-family="Inter, -apple-system, sans-serif"
        font-size="18" font-weight="500" fill="#818CF8">Streaks</text>

  <rect x="540" y="496" width="126" height="40" rx="20" fill="#6366F1" fill-opacity="0.18"/>
  <text x="603" y="522" text-anchor="middle"
        font-family="Inter, -apple-system, sans-serif"
        font-size="18" font-weight="500" fill="#818CF8">Free forever</text>

  <!-- URL -->
  <text x="88" y="596"
        font-family="Inter, -apple-system, sans-serif"
        font-size="18" font-weight="400"
        fill="#475569">focus-time-tracker-lilac.vercel.app</text>
</svg>
